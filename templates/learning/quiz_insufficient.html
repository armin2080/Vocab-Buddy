{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto text-center">
  <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6">
    <div class="text-4xl mb-4">🧠</div>
    <h2 class="text-2xl font-bold text-yellow-900 mb-2">Not Enough Words!</h2>
    <p class="text-gray-700 mb-4">
      You need at least <strong>{{ needed }}</strong> words to start a quiz.
      You currently have <strong>{{ have }}</strong>.
    </p>
    <p class="text-gray-600 text-sm mb-6">
      Add more words to your vocabulary and come back to test your knowledge!
    </p>
  </div>
  
  <div class="mt-6 space-x-4">
    <a href="{% url 'words:add_word' %}" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
      ➕ Add Words
    </a>
    <a href="{% url 'learning:index' %}" class="inline-block bg-gray-300 hover:bg-gray-400 text-gray-900 font-bold py-2 px-4 rounded">
      ← Back
    </a>
  </div>
</div>
{% endblock %}
