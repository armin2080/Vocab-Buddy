{% extends 'base.html' %}

{% block title %}Login - Vocab Buddy{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-120px)] items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
    <div class="w-full max-w-md space-y-8">
            <!-- Header -->
            <div class="text-center">
                <h2 class="text-2xl font-bold text-gray-900">Sign In</h2>
                <p class="mt-2 text-sm text-gray-600">
                    New user? 
                    <a href="{% url 'authentication:register' %}" class="font-medium text-blue-600 hover:text-blue-500">Create an account</a>
                </p>
            </div>

            <!-- Form -->
            <form method="post" class="space-y-6">
                {% csrf_token %}

                <!-- Username Field -->
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700">Username</label>
                    <input
                        type="text"
                        name="username"
                        id="id_username"
                        required
                        class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-blue-500 sm:text-sm"
                        placeholder="Enter your username"
                    >
                </div>

                <!-- Password Field -->
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input
                        type="password"
                        name="password"
                        id="id_password"
                        required
                        class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-blue-500 sm:text-sm"
                        placeholder="Enter your password"
                    >
                </div>

                <!-- Submit Button -->
                <button
                    type="submit"
                    class="w-full rounded-md bg-blue-600 px-4 py-2 text-white font-medium hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                >
                    Sign In
                </button>
            </form>

            <!-- Footer -->
            <p class="text-center text-sm text-gray-600">
                <a href="/" class="font-medium text-gray-600 hover:text-gray-500">Back to Home</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
